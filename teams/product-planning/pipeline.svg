<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1780" width="820" height="1780" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="1780" fill="#F8F9FA" rx="12"/>

  <!-- Title -->
  <rect x="20" y="16" width="780" height="52" rx="8" fill="#1A1A2E"/>
  <text x="410" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">상품 기획팀 파이프라인</text>

  <!-- ── PHASE LABEL: 시장조사 ── -->
  <rect x="20" y="84" width="780" height="28" rx="6" fill="#E8F4FD"/>
  <text x="410" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">[ 시장조사 — 8단계 순차 ]</text>

  <!-- Step 1 -->
  <rect x="40" y="122" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="122" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="146" font-size="11" font-weight="700" fill="#1565C0">Step 1  product-market-target</text>
  <text x="62" y="163" font-size="11" fill="#424242">타겟군 조사 — 문제 키워드에 해당하는 연령·성별·라이프스타일 세분화</text>
  <text x="62" y="180" font-size="10" fill="#757575">WebSearch ≤4  /  출력: market/01_target_groups.json</text>
  <text x="62" y="195" font-size="10" fill="#9E9E9E">→ target_segments, primary_target</text>

  <!-- Arrow -->
  <line x1="410" y1="202" x2="410" y2="218" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,222 405,212 415,212" fill="#90CAF9"/>

  <!-- Step 2 -->
  <rect x="40" y="222" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="222" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="246" font-size="11" font-weight="700" fill="#1565C0">Step 2  product-market-problem</text>
  <text x="62" y="263" font-size="11" fill="#424242">타겟별 문제 조사 — 구체적 증상·발현 상황·심각도</text>
  <text x="62" y="280" font-size="10" fill="#757575">WebSearch ≤5  /  입력: 01  /  출력: market/02_target_problems.json</text>
  <text x="62" y="295" font-size="10" fill="#9E9E9E">→ problems_by_segment, top_problems</text>

  <!-- Arrow -->
  <line x1="410" y1="302" x2="410" y2="318" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,322 405,312 415,312" fill="#90CAF9"/>

  <!-- Step 3 -->
  <rect x="40" y="322" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="322" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="346" font-size="11" font-weight="700" fill="#1565C0">Step 3  product-market-mechanism</text>
  <text x="62" y="363" font-size="11" fill="#424242">문제 정의·메커니즘 조사 — 의학적·생리적 원인, 악화 요인</text>
  <text x="62" y="380" font-size="10" fill="#757575">WebSearch ≤4  /  입력: 02  /  출력: market/03_problem_mechanism.json</text>
  <text x="62" y="395" font-size="10" fill="#9E9E9E">→ mechanisms, consumer_friendly_explanation</text>

  <!-- Arrow -->
  <line x1="410" y1="402" x2="410" y2="418" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,422 405,412 415,412" fill="#90CAF9"/>

  <!-- Step 4 -->
  <rect x="40" y="422" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="422" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="446" font-size="11" font-weight="700" fill="#1565C0">Step 4  product-market-consumer-voice</text>
  <text x="62" y="463" font-size="11" fill="#424242">소비자 실제 고민 조사 — 커뮤니티에서 날것의 소비자 언어 수집</text>
  <text x="62" y="480" font-size="10" fill="#757575">WebSearch ≤5  /  입력: 02  /  출력: market/04_consumer_voice.json</text>
  <text x="62" y="495" font-size="10" fill="#9E9E9E">→ emotional_hooks, search_language (경쟁제품 탐색 키워드 소스)</text>

  <!-- Arrow -->
  <line x1="410" y1="502" x2="410" y2="518" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,522 405,512 415,512" fill="#90CAF9"/>

  <!-- Step 5 -->
  <rect x="40" y="522" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="522" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="546" font-size="11" font-weight="700" fill="#1565C0">Step 5  product-market-expert</text>
  <text x="62" y="563" font-size="11" fill="#424242">전문가 의견 조사 — 의료·영양 전문가·공식 기관 권고안</text>
  <text x="62" y="580" font-size="10" fill="#757575">WebSearch ≤4  /  입력: 03  /  출력: market/05_expert_opinion.json</text>
  <text x="62" y="595" font-size="10" fill="#9E9E9E">→ key_nutrients_mentioned, official_guidelines</text>

  <!-- Arrow -->
  <line x1="410" y1="602" x2="410" y2="618" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,622 405,612 415,612" fill="#90CAF9"/>

  <!-- Step 6 -->
  <rect x="40" y="622" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="622" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="646" font-size="11" font-weight="700" fill="#1565C0">Step 6  product-market-seasonality</text>
  <text x="62" y="663" font-size="11" fill="#424242">시즌성 조사 — 계절·이벤트 패턴, 출시 최적 시기</text>
  <text x="62" y="680" font-size="10" fill="#757575">WebSearch ≤3  /  입력: 02  /  출력: market/06_seasonality.json</text>
  <text x="62" y="695" font-size="10" fill="#9E9E9E">→ peak_months, launch_timing_implication</text>

  <!-- Arrow -->
  <line x1="410" y1="702" x2="410" y2="718" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,722 405,712 415,712" fill="#90CAF9"/>

  <!-- Step 7 -->
  <rect x="40" y="722" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="722" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="746" font-size="11" font-weight="700" fill="#1565C0">Step 7  product-market-alternatives</text>
  <text x="62" y="763" font-size="11" fill="#424242">영양제 외 해결책 조사 — 식단·병원·생활습관 대안, 영양제 전환 계기</text>
  <text x="62" y="780" font-size="10" fill="#757575">WebSearch ≤4  /  입력: 04  /  출력: market/07_other_solutions.json</text>
  <text x="62" y="795" font-size="10" fill="#9E9E9E">→ alternatives, supplement_preference_trigger</text>

  <!-- Arrow -->
  <line x1="410" y1="802" x2="410" y2="818" stroke="#90CAF9" stroke-width="2"/>
  <polygon points="410,822 405,812 415,812" fill="#90CAF9"/>

  <!-- Step 8 -->
  <rect x="40" y="822" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="40" y="822" width="6" height="80" rx="3" fill="#42A5F5"/>
  <text x="62" y="846" font-size="11" font-weight="700" fill="#1565C0">Step 8  product-market-ingredients</text>
  <text x="62" y="863" font-size="11" fill="#424242">영양제 성분 조사 — 기전·근거·권장량·추천 스택·시장 공백</text>
  <text x="62" y="880" font-size="10" fill="#757575">WebSearch ≤5  /  입력: 03+05  /  출력: market/08_ingredient_research.json</text>
  <text x="62" y="895" font-size="10" fill="#9E9E9E">→ recommended_stack, differentiation_opportunity</text>

  <!-- ── PHASE LABEL: 후속 파이프라인 ── -->
  <line x1="410" y1="902" x2="410" y2="916" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="410,920 405,910 415,910" fill="#CE93D8"/>
  <rect x="20" y="920" width="780" height="28" rx="6" fill="#F3E5F5"/>
  <text x="410" y="938" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">[ 후속 파이프라인 ]</text>

  <!-- Step 9 -->
  <rect x="40" y="958" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1.5"/>
  <rect x="40" y="958" width="6" height="80" rx="3" fill="#AB47BC"/>
  <text x="62" y="982" font-size="11" font-weight="700" fill="#6A1B9A">Step 9  product-explorer</text>
  <text x="62" y="999" font-size="11" fill="#424242">경쟁 제품 탐색 — 검색 키워드·성분 스택 기준 상위 5개 제품 분석</text>
  <text x="62" y="1016" font-size="10" fill="#757575">WebSearch  /  입력: 04(search_language) + 08(recommended_stack)</text>
  <text x="62" y="1031" font-size="10" fill="#9E9E9E">출력: product_exploration.json  →  top_products, market_summary.white_space</text>

  <!-- Arrow -->
  <line x1="410" y1="1038" x2="410" y2="1054" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="410,1058 405,1048 415,1048" fill="#CE93D8"/>

  <!-- Step 10 -->
  <rect x="40" y="1058" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1.5"/>
  <rect x="40" y="1058" width="6" height="80" rx="3" fill="#AB47BC"/>
  <text x="62" y="1082" font-size="11" font-weight="700" fill="#6A1B9A">Step 10  product-review-analyst</text>
  <text x="62" y="1099" font-size="11" fill="#424242">소비자 리뷰 분석 — 상위 5개 제품 좋은 점/나쁜 점/미충족 니즈</text>
  <text x="62" y="1116" font-size="10" fill="#757575">WebSearch  /  입력: product_exploration.json</text>
  <text x="62" y="1131" font-size="10" fill="#9E9E9E">출력: consumer_reviews.json  →  common_unmet_needs, consumer_language_bank</text>

  <!-- Arrow -->
  <line x1="410" y1="1138" x2="410" y2="1154" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="410,1158 405,1148 415,1148" fill="#CE93D8"/>

  <!-- Step 11 -->
  <rect x="40" y="1158" width="740" height="90" rx="8" fill="#FFFFFF" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="40" y="1158" width="6" height="90" rx="3" fill="#7B1FA2"/>
  <text x="62" y="1183" font-size="11" font-weight="700" fill="#4A148C">Step 11  product-ideator</text>
  <text x="62" y="1200" font-size="11" fill="#424242">신제품 아이디어 도출 — 시장조사 전 단계 종합, 아이디어 3개 + 최우선 1개</text>
  <text x="62" y="1217" font-size="10" fill="#757575">model: opus  /  입력: market/ 8개 파일(선택 필드) + 탐색 + 리뷰</text>
  <text x="62" y="1234" font-size="10" fill="#9E9E9E">출력: product_ideas.json  →  ideas[], recommended_idea</text>
  <rect x="612" y="1165" width="148" height="22" rx="4" fill="#EDE7F6"/>
  <text x="686" y="1180" text-anchor="middle" font-size="10" fill="#4A148C">선택 필드만 로딩</text>

  <!-- Arrow -->
  <line x1="410" y1="1248" x2="410" y2="1264" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="410,1268 405,1258 415,1258" fill="#CE93D8"/>

  <!-- Step 12 -->
  <rect x="40" y="1268" width="740" height="90" rx="8" fill="#FFFFFF" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="40" y="1268" width="6" height="90" rx="3" fill="#7B1FA2"/>
  <text x="62" y="1293" font-size="11" font-weight="700" fill="#4A148C">Step 12  product-brief-writer</text>
  <text x="62" y="1310" font-size="11" fill="#424242">상품 기획서 작성 — 경쟁사 비교표·스펙·가격 전략·출시 타임라인</text>
  <text x="62" y="1327" font-size="10" fill="#757575">model: opus  /  입력: ideas + 탐색 + 리뷰 + 06_seasonality</text>
  <text x="62" y="1344" font-size="10" fill="#9E9E9E">출력: product_brief.md</text>

  <!-- ── PHASE LABEL: 배포 ── -->
  <line x1="410" y1="1358" x2="410" y2="1372" stroke="#A5D6A7" stroke-width="2"/>
  <polygon points="410,1376 405,1366 415,1366" fill="#A5D6A7"/>
  <rect x="20" y="1376" width="780" height="28" rx="6" fill="#E8F5E9"/>
  <text x="410" y="1394" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">[ 배포 ]</text>

  <!-- Step 13 -->
  <rect x="40" y="1414" width="740" height="80" rx="8" fill="#FFFFFF" stroke="#43A047" stroke-width="1.5"/>
  <rect x="40" y="1414" width="6" height="80" rx="3" fill="#43A047"/>
  <text x="62" y="1438" font-size="11" font-weight="700" fill="#2E7D32">Step 13  shared-distributor</text>
  <text x="62" y="1455" font-size="11" fill="#424242">배포 — Slack 기획서 요약 전송 + Notion 페이지 생성</text>
  <text x="62" y="1472" font-size="10" fill="#757575">model: haiku  /  입력: product_brief.md</text>
  <text x="62" y="1487" font-size="10" fill="#9E9E9E">출력: Slack 메시지 + Notion URL</text>

  <!-- ── OUTPUT FILES BOX ── -->
  <rect x="40" y="1514" width="740" height="202" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="60" y="1539" font-size="12" font-weight="700" fill="#424242">산출물 경로</text>
  <text x="60" y="1558" font-size="10" fill="#616161" font-family="Consolas, monospace">teams/product-planning/outputs/{research_id}/</text>
  <text x="76" y="1575" font-size="10" fill="#616161" font-family="Consolas, monospace">├── market/</text>
  <text x="92" y="1591" font-size="10" fill="#1565C0" font-family="Consolas, monospace">│   ├── 01_target_groups.json     04_consumer_voice.json     07_other_solutions.json</text>
  <text x="92" y="1607" font-size="10" fill="#1565C0" font-family="Consolas, monospace">│   ├── 02_target_problems.json   05_expert_opinion.json     08_ingredient_research.json</text>
  <text x="92" y="1623" font-size="10" fill="#1565C0" font-family="Consolas, monospace">│   └── 03_problem_mechanism.json 06_seasonality.json</text>
  <text x="76" y="1641" font-size="10" fill="#6A1B9A" font-family="Consolas, monospace">├── product_exploration.json</text>
  <text x="76" y="1657" font-size="10" fill="#6A1B9A" font-family="Consolas, monospace">├── consumer_reviews.json</text>
  <text x="76" y="1673" font-size="10" fill="#4A148C" font-family="Consolas, monospace">├── product_ideas.json</text>
  <text x="76" y="1689" font-size="10" fill="#4A148C" font-family="Consolas, monospace">└── product_brief.md</text>

  <!-- Context window note -->
  <rect x="40" y="1730" width="740" height="36" rx="6" fill="#FFF8E1" stroke="#FFD54F" stroke-width="1.5"/>
  <text x="60" y="1747" font-size="10" font-weight="700" fill="#F57F17">컨텍스트 윈도우 최적화 규칙 (시장조사 8개 에이전트 공통)</text>
  <text x="60" y="1759" font-size="10" fill="#795548">WebSearch ≤5  ·  URL 방문 ≤3  ·  원문 저장 금지  ·  필드 최대 200자  ·  직전 단계 파일만 읽기</text>

</svg>
