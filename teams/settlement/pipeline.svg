<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="704" viewBox="0 0 900 704">

  <rect width="900" height="704" fill="#FFFFFF"/>

  <text x="450" y="56" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="13" fill="#55577A" text-anchor="middle">브레인올로지</text>
  <text x="450" y="98" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="30" font-weight="bold" fill="#1A1A2E" text-anchor="middle">정산팀 파이프라인</text>
  <line x1="200" y1="110" x2="700" y2="110" stroke="#1A8A6A" stroke-width="2"/>

  <rect x="180" y="120" width="540" height="30" rx="7"
        fill="#dcede8" stroke="#D0D5E8" stroke-width="1"/>
  <text x="450" y="140" font-family="'Consolas','Courier New',monospace"
        font-size="13" fill="#1A8A6A" text-anchor="middle">/run-settlement  대상=홍길동  시작일=2026-02-01  종료일=2026-02-28</text>

  <text x="450" y="178" font-family="'Consolas','Courier New',monospace"
        font-size="11" fill="#55577A" text-anchor="middle">run_id = {YYYYMMDD_HHMMSS}  (기본: 전월 1일 ~ 말일)</text>

  <g>
    <rect x="50" y="210" width="800" height="104" rx="10"
          fill="#F8F9FC" stroke="#3AAA8A" stroke-width="1.2"/>
    <rect x="50" y="210" width="8" height="104" rx="4" fill="#3AAA8A"/>
    <rect x="54" y="210" width="4" height="104" fill="#3AAA8A"/>

    <rect x="70" y="222" width="66" height="22" rx="5" fill="#3AAA8A"/>
    <text x="103" y="237" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
          font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">STEP 1</text>
    

    <text x="70" y="265" font-family="'Consolas','Courier New',monospace"
          font-size="11" fill="#55577A">settlement-target-fetcher</text>

    <text x="260" y="248" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
          font-size="19" font-weight="bold" fill="#1A1A2E">정산 대상 조회</text>
    <text x="260" y="270" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
          font-size="12" fill="#55577A">Notion DB → 상태='활성중' 대상 전체 조회</text>
    <text x="260" y="290" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="12" fill="#55577A">`대상` 인자 있으면 해당 이름만 필터링</text>

    <rect x="670" y="224" width="158" height="22" rx="5"
          fill="#e1f2ed" stroke="#3AAA8A" stroke-width="0.9"/>
    <text x="749" y="239" font-family="'Consolas','Courier New',monospace"
          font-size="11" font-weight="bold" fill="#3AAA8A" text-anchor="middle">Notion API</text>

    <rect x="650" y="276" width="178" height="24" rx="5"
          fill="#e1f2ed" stroke="#3AAA8A" stroke-width="0.8"/>
    <text x="739" y="292" font-family="'Consolas','Courier New',monospace"
          font-size="11" fill="#3AAA8A" text-anchor="middle">targets.json</text>
  </g>
  <line x1="450" y1="314" x2="450" y2="327" stroke="#3AAA8A" stroke-width="2"/>
  <polygon points="444,325 456,325 450,333" fill="#3AAA8A"/>
  <g>
    <rect x="50" y="332" width="800" height="104" rx="10"
