    <text x="260" y="534" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="12" fill="#55577A">Notion 업로드 · Slack 완료 알림</text>

    <rect x="670" y="468" width="158" height="22" rx="5"
          fill="#dcebe6" stroke="#1A7A5A" stroke-width="0.9"/>
    <text x="749" y="483" font-family="'Consolas','Courier New',monospace"
          font-size="11" font-weight="bold" fill="#1A7A5A" text-anchor="middle">fpdf2 / Notion / Slack</text>

    <rect x="650" y="520" width="178" height="24" rx="5"
          fill="#dcebe6" stroke="#1A7A5A" stroke-width="0.8"/>
    <text x="739" y="536" font-family="'Consolas','Courier New',monospace"
          font-size="11" fill="#1A7A5A" text-anchor="middle">settlement_{name}.pdf</text>
  </g>
  <line x1="450" y1="662" x2="450" y2="675" stroke="#1A8A6A" stroke-width="2"/>
  <polygon points="444,673 456,673 450,681" fill="#1A8A6A"/>
  <rect x="50" y="680" width="800" height="88" rx="10"
        fill="#dcede8" stroke="#1A8A6A" stroke-width="1.5"/>
  <text x="450" y="702" font-family="'Consolas','Courier New',monospace"
        font-size="12" fill="#1A8A6A" text-anchor="middle">teams/settlement/outputs/{run_id}/</text>
  <line x1="70" y1="712" x2="830" y2="712"
        stroke="#D0D5E8" stroke-width="0.8"/>
  <text x="70" y="738" font-family="'Consolas','Courier New',monospace"
        font-size="10" fill="#3AAA8A">● targets.json</text>
  <text x="70" y="756" font-family="'Consolas','Courier New',monospace"
        font-size="9" fill="#55577A" opacity="0.7">Step 1</text>
  <text x="260" y="738" font-family="'Consolas','Courier New',monospace"
        font-size="10" fill="#2A9A7A">● sales_{name}.json</text>
  <text x="260" y="756" font-family="'Consolas','Courier New',monospace"
        font-size="9" fill="#55577A" opacity="0.7">Step 2</text>
  <text x="450" y="738" font-family="'Consolas','Courier New',monospace"
        font-size="10" fill="#1A7A5A">● settlement_{name}.pdf</text>
  <text x="450" y="756" font-family="'Consolas','Courier New',monospace"
        font-size="9" fill="#55577A" opacity="0.7">Step 3</text>
  <text x="640" y="738" font-family="'Consolas','Courier New',monospace"
        font-size="10" fill="#0A5A3A">● Notion + Slack</text>
  <text x="640" y="756" font-family="'Consolas','Courier New',monospace"
        font-size="9" fill="#55577A" opacity="0.7">Step 4</text>

  <text x="450" y="692" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="11" fill="#9090AA" text-anchor="middle">브레인올로지 정산팀  ·  Claude Code 기반 멀티에이전트 파이프라인</text>
</svg>