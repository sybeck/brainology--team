    <text x="260" y="392" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
          font-size="12" fill="#55577A">Cafe24 로그인 → 기간별 매출 엑셀 다운로드</text>
    <text x="260" y="412" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="12" fill="#55577A">옵션별 집계 · 대상별 순차 처리</text>

    <rect x="670" y="346" width="158" height="22" rx="5"
          fill="#dfefeb" stroke="#2A9A7A" stroke-width="0.9"/>
    <text x="749" y="361" font-family="'Consolas','Courier New',monospace"
          font-size="11" font-weight="bold" fill="#2A9A7A" text-anchor="middle">Playwright / Bash</text>

    <rect x="650" y="398" width="178" height="24" rx="5"
          fill="#dfefeb" stroke="#2A9A7A" stroke-width="0.8"/>
    <text x="739" y="414" font-family="'Consolas','Courier New',monospace"
          font-size="11" fill="#2A9A7A" text-anchor="middle">sales_{name}.json</text>
  </g>
  <line x1="450" y1="436" x2="450" y2="449" stroke="#2A9A7A" stroke-width="2"/>
  <polygon points="444,447 456,447 450,455" fill="#2A9A7A"/>
  <g>
    <rect x="50" y="454" width="800" height="104" rx="10"
          fill="#F8F9FC" stroke="#1A7A5A" stroke-width="1.2"/>
    <rect x="50" y="454" width="8" height="104" rx="4" fill="#1A7A5A"/>
    <rect x="54" y="454" width="4" height="104" fill="#1A7A5A"/>

    <rect x="70" y="466" width="66" height="22" rx="5" fill="#1A7A5A"/>
    <text x="103" y="481" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
          font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">STEP 3</text>
    

    <text x="70" y="509" font-family="'Consolas','Courier New',monospace"
          font-size="11" fill="#55577A">settlement-report-writer</text>

    <text x="260" y="492" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
          font-size="19" font-weight="bold" fill="#1A1A2E">정산서 작성 · 배포</text>
    <text x="260" y="514" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
