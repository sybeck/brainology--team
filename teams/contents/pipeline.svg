    <rect x="70" y="248" width="44" height="14" rx="3" fill="#D9601A" opacity="0.2"/><text x="92" y="258" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="8" fill="#D9601A" text-anchor="middle" font-weight="bold">병렬</text>

    <text x="70" y="265" font-family="'Consolas','Courier New',monospace"
