  <text x="450" y="178" font-family="'Consolas','Courier New',monospace"
        font-size="11" fill="#55577A" text-anchor="middle">campaign_id = {제품명}_{YYYYMMDD_HHMMSS}</text>

  <g>
    <rect x="50" y="210" width="800" height="104" rx="10"
