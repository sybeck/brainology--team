<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="948" viewBox="0 0 900 948">

  <rect width="900" height="948" fill="#FFFFFF"/>

  <text x="450" y="56" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
