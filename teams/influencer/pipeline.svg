<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="826" viewBox="0 0 900 826">

  <rect width="900" height="826" fill="#FFFFFF"/>

  <text x="450" y="56" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="13" fill="#55577A" text-anchor="middle">브레인올로지</text>
  <text x="450" y="98" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="30" font-weight="bold" fill="#1A1A2E" text-anchor="middle">인플루언서팀 파이프라인</text>
  <line x1="200" y1="110" x2="700" y2="110" stroke="#B83A8A" stroke-width="2"/>

