  <text x="640" y="860" font-family="'Consolas','Courier New',monospace"
        font-size="10" fill="#7A1A3A">● Slack + Notion</text>
  <text x="640" y="878" font-family="'Consolas','Courier New',monospace"
        font-size="9" fill="#55577A" opacity="0.7">Step 4</text>

  <text x="450" y="814" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
