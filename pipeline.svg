  <text x="65" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#718096">PHASE 3</text>
  <text x="65" y="432" text-anchor="middle" font-size="10" fill="#718096">제작 (병렬)</text>

  <!-- ─ IMAGE PATH ─ -->
  <rect x="110" y="360" width="265" height="200" rx="10" fill="#F0FFF4" stroke="#38A169" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="242" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">이미지 경로 (5개)</text>

  <!-- contents-copywriter (image) -->
  <rect x="125" y="383" width="235" height="52" rx="8" fill="white" stroke="#38A169" stroke-width="1.5"/>
  <text x="242" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#22543D">✍️ contents-copywriter</text>
  <text x="242" y="422" text-anchor="middle" font-size="10" fill="#276749">이미지 5개 카피 · A/B 변형 작성</text>

  <line x1="242" y1="435" x2="242" y2="455" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- contents-image -->
  <rect x="125" y="458" width="235" height="52" rx="8" fill="white" stroke="#38A169" stroke-width="1.5"/>
  <text x="242" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#22543D">🖼️ contents-image</text>
  <text x="242" y="497" text-anchor="middle" font-size="10" fill="#276749">이미지 생성 · 브랜드 가이드 자체 검수</text>

