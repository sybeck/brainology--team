<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 920" width="900" height="920" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">

  <!-- Background -->
  <rect width="900" height="920" fill="#F8FAFB" rx="0"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="64" fill="#1A1A2E"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="white">브레인올로지 메타 광고 콘텐츠 제작 파이프라인</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#A0AEC0">제품 1개 기준 · 이미지 광고 5개 + 영상 스크립트 10개</text>

  <!-- ── INPUT ── -->
  <rect x="280" y="84" width="340" height="52" rx="10" fill="#EBF8FF" stroke="#3182CE" stroke-width="1.5"/>
  <text x="450" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B6CB0">INPUT</text>
  <text x="450" y="125" text-anchor="middle" font-size="11" fill="#4A5568">products/{제품명}.md  ·  brand/brand_guide.md</text>

  <!-- Arrow down -->
  <line x1="450" y1="136" x2="450" y2="158" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── PHASE 1 label ── -->
  <text x="65" y="194" text-anchor="middle" font-size="11" font-weight="bold" fill="#718096">PHASE 1</text>
  <text x="65" y="208" text-anchor="middle" font-size="10" fill="#718096">병렬 리서치</text>

  <!-- Phase 1 container -->
  <rect x="110" y="160" width="680" height="80" rx="10" fill="#FFFBEB" stroke="#D69E2E" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- contents-reference -->
  <rect x="130" y="174" width="295" height="52" rx="8" fill="white" stroke="#D69E2E" stroke-width="1.5"/>
  <text x="277" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">🔍 contents-reference</text>
  <text x="277" y="213" text-anchor="middle" font-size="10" fill="#92400E">Meta Ad · 경쟁사 광고 · 트렌드 수집 (7일 캐시)</text>

  <!-- contents-researcher -->
  <rect x="475" y="174" width="295" height="52" rx="8" fill="white" stroke="#D69E2E" stroke-width="1.5"/>
  <text x="622" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">👩‍👧 contents-researcher</text>
  <text x="622" y="213" text-anchor="middle" font-size="10" fill="#92400E">부모 커뮤니티 · 페인포인트 수집 (7일 캐시)</text>

  <!-- Parallel label -->
  <text x="450" y="173" text-anchor="middle" font-size="10" fill="#B7791F">동시 실행</text>

  <!-- Arrow down -->
  <line x1="450" y1="240" x2="450" y2="262" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── PHASE 2 label ── -->
  <text x="65" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#718096">PHASE 2</text>
  <text x="65" y="310" text-anchor="middle" font-size="10" fill="#718096">기획</text>

  <!-- contents-planner -->
  <rect x="260" y="264" width="380" height="60" rx="8" fill="white" stroke="#6B46C1" stroke-width="2"/>
  <text x="450" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#553C9A">🧠 contents-planner</text>
  <text x="450" y="306" text-anchor="middle" font-size="10" fill="#6B46C1">제품 + 레퍼런스 + 소비자 인사이트 종합</text>
  <text x="450" y="318" text-anchor="middle" font-size="10" fill="#6B46C1">이미지 컨셉 5개 + 영상 컨셉 10개 기획</text>

  <!-- Arrow down + branch lines -->
  <line x1="450" y1="324" x2="450" y2="345" stroke="#718096" stroke-width="1.5"/>
  <line x1="230" y1="345" x2="670" y2="345" stroke="#718096" stroke-width="1.5"/>
  <line x1="230" y1="345" x2="230" y2="367" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="345" x2="670" y2="367" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>

